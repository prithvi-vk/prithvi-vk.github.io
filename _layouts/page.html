---
layout: default
---
<div class="wrap">
  <article class="article">
    {% if page.kicker %}<div class="kicker">{{ page.kicker }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="deck">{{ page.subtitle }}</p>{% endif %}
    <div class="prose">
      {{ content }}
    </div>
  </article>
</div>
